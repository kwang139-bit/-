<style>
  :root{
    --bg:#0B1120; --bg-deep:#060a14; --accent:#60A5FA; --moon:#FDE68A;
    --text:#F8FAFC; --text-dim:#94A3B8; --card-radius:24px; --btn-radius:9999px;
    --glass:rgba(248,250,252,0.06); --glass-border:rgba(248,250,252,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;}
  .serif{font-family:'Instrument Serif',serif;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  .nav{
    position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
    padding:18px 5vw;background:rgba(11,17,32,0.72);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--glass-border);
  }
  .nav-logo{font-family:'Instrument Serif',serif;font-size:1.3rem;display:flex;align-items:center;gap:8px;}
  .nav-logo .dot{width:7px;height:7px;border-radius:50%;background:var(--moon);box-shadow:0 0 10px var(--moon);}
  .back-link{font-size:.85rem;color:var(--text-dim);display:flex;align-items:center;gap:6px;transition:color .25s;}
  .back-link:hover{color:var(--text);}

  /* COVER */
  .cover{position:relative;min-height:66vh;display:flex;align-items:flex-end;background-size:cover;background-position:center;}
  .cover-overlay{position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(6,10,20,0.25) 0%, rgba(6,10,20,0.6) 60%, rgba(6,10,20,0.97) 100%);}
  .cover-content{position:relative;z-index:2;padding:64px 5vw 56px;max-width:900px;}
  .cover-eyebrow{font-size:.78rem;letter-spacing:3px;color:var(--moon);font-weight:700;text-transform:uppercase;margin-bottom:16px;}
  .cover-title{font-family:'Instrument Serif',serif;font-size:clamp(2.2rem,5vw,3.6rem);line-height:1.15;}
  .cover-meta{margin-top:20px;display:flex;gap:18px;align-items:center;color:var(--text-dim);font-size:.85rem;}
  .cover-meta .dot-sep{width:4px;height:4px;border-radius:50%;background:var(--text-dim);}

  /* ESSAY */
  .essay-wrap{max-width:680px;margin:0 auto;padding:80px 6vw 40px;}
  .essay-wrap p{color:#E2E8F0;font-size:1.08rem;line-height:1.95;margin-bottom:28px;}
  .essay-wrap p:first-of-type::first-letter{
    font-family:'Instrument Serif',serif;font-size:3.6rem;float:left;line-height:0.8;padding:8px 10px 0 0;color:var(--moon);
  }

  /* RELATED JOURNEY */
  .related-journey{
    max-width:680px;margin:20px auto 90px;padding:6vw;
  }
  .rj-card{
    position:relative;border-radius:28px;overflow:hidden;min-height:220px;display:flex;align-items:flex-end;
    background-size:cover;background-position:center;border:1px solid var(--glass-border);
  }
  .rj-overlay{position:absolute;inset:0;background:linear-gradient(180deg, transparent 20%, rgba(6,10,20,.92));}
  .rj-content{position:relative;z-index:2;padding:28px;display:flex;justify-content:space-between;align-items:flex-end;width:100%;flex-wrap:wrap;gap:14px;}
  .rj-label{font-size:.7rem;letter-spacing:2px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:8px;}
  .rj-title{font-family:'Instrument Serif',serif;font-size:1.6rem;}
  .btn{border-radius:var(--btn-radius);padding:13px 26px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;
    background:var(--accent);color:#08101F;display:inline-flex;align-items:center;gap:8px;transition:transform .3s ease;}
  .btn:hover{transform:translateY(-2px);}

  /* MORE STORIES */
  section.more{padding:20px 5vw 90px;}
  .section-eyebrow{font-size:.72rem;letter-spacing:3px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:14px;}
  .section-title{font-family:'Instrument Serif',serif;font-size:clamp(1.5rem,2.6vw,2rem);margin-bottom:24px;}
  .more-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
  .more-card{position:relative;height:220px;border-radius:20px;overflow:hidden;display:block;border:1px solid var(--glass-border);
    transition:transform .4s ease, box-shadow .4s ease;}
  .more-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px -12px rgba(96,165,250,.3);}
  .more-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
  .more-overlay{position:absolute;inset:0;background:linear-gradient(180deg, transparent 35%, rgba(6,10,20,.92));}
  .more-body{position:absolute;left:0;right:0;bottom:0;padding:18px;}
  .more-read{font-size:.66rem;color:var(--moon);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
  .more-title{font-family:'Instrument Serif',serif;font-size:1.15rem;margin-top:4px;}

  footer{padding:40px 5vw;border-top:1px solid var(--glass-border);text-align:center;color:var(--text-dim);font-size:.82rem;}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo"><span class="dot"></span>Moonlight Sea</a>
  <a href="index.html" class="back-link">← All Stories</a>
</nav>

<header class="cover" id="cover">
  <div class="cover-overlay"></div>
  <div class="cover-content">
    <div class="cover-eyebrow" id="sCity">Gwangju</div>
    <h1 class="cover-title serif" id="sTitle">광주의 밤, 재즈가 흐르는 골목</h1>
    <div class="cover-meta">
      <span>Moonlight Sea Editorial</span>
      <span class="dot-sep"></span>
      <span id="sRead">8 min read</span>
    </div>
  </div>
</header>

<div class="essay-wrap" id="essayWrap"></div>

<div class="related-journey">
  <div class="rj-card" id="rjCard">
    <div class="rj-overlay"></div>
    <div class="rj-content">
      <div>
        <div class="rj-label">Related Journey</div>
        <div class="rj-title" id="rjTitle">Rain on Chungjang-ro</div>
      </div>
      <a href="#" id="rjBtn" class="btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Play Journey
      </a>
    </div>
  </div>
</div>

<section class="more">
  <div class="section-eyebrow">Keep Reading</div>
  <h2 class="section-title">More Stories</h2>
  <div class="more-grid" id="moreGrid"></div>
</section>

<footer>© 2026 Moonlight Sea. Travel Through Music.</footer>

<script>
  const photoBg = (photo, grad) => photo
    ? `linear-gradient(160deg, rgba(11,17,32,.35), rgba(11,17,32,.15)), url('${photo}') center/cover no-repeat`
    : grad;

  const journeys = [
    {slug:'tokyo-shibuya-after-hours', city:'Tokyo', title:'Shibuya After Hours', photo:'images/tokyo-tower-night.jpg', grad:'linear-gradient(135deg,#1a1440,#3a2a6b 60%,#5b3d8f)'},
    {slug:'tokyo-yamanote-late-train', city:'Tokyo', title:'Last Train on the Yamanote', photo:'images/tokyo-tower-night.jpg', grad:'linear-gradient(135deg,#161233,#3a2a6b 60%,#6b4fa8)'},
    {slug:'seoul-neon-hangang', city:'Seoul', title:'Neon Hangang', photo:'images/seoul-river-night.jpg', grad:'linear-gradient(135deg,#101a30,#1c3459 60%,#2f5b8f)'},
    {slug:'jeju-island-wind', city:'Jeju', title:'Island Wind', photo:'images/jeju-cliff.jpg', grad:'linear-gradient(135deg,#0f2b28,#1d4a42 60%,#2f7a6a)'},
    {slug:'gwangju-rain-chungjangro', city:'Gwangju', title:'Rain on Chungjang-ro', photo:'images/gwangju-street.jpg', grad:'linear-gradient(135deg,#241a30,#3d2a52 60%,#5c4179)'},
    {slug:'paris-left-bank-nocturne', city:'Paris', title:'Left Bank Nocturne', photo:'images/paris-eiffel-night.jpg', grad:'linear-gradient(135deg,#2a1420,#4a2438 60%,#743a58)'},
    {slug:'london-thames-midnight', city:'London', title:'Thames at Midnight', photo:'images/london-thames-night.jpg', grad:'linear-gradient(135deg,#141b26,#243447 60%,#3a5570)'}
  ];

  const stories = [
    {
      slug:'gwangju-jazz-alley', title:'광주의 밤, 재즈가 흐르는 골목', read:'8 min read', city:'Gwangju',
      photo:'images/gwangju-street.jpg', grad:'linear-gradient(160deg,#241a30,#5c4179)', relatedJourney:'gwangju-rain-chungjangro',
      body:[
        '비가 내리기 시작한 건 충장로에 들어선 지 십 분쯤 지나서였다. 우산도 없이 걷는 사람들, 젖은 아스팔트에 번지는 간판 불빛, 그리고 어디선가 희미하게 들려오는 콘트라베이스 소리. 그 소리를 따라 골목 안쪽으로 걸음을 옮겼다.',
        '간판도 없는 지하 계단 앞에서 잠시 망설였다. 낡은 철문을 밀고 들어서자, 담배 연기 대신 눅눅한 습기와 낮은 조도의 조명, 그리고 트럼펫과 피아노가 주고받는 즉흥 연주가 공간을 채우고 있었다. 열 명 남짓한 손님들은 각자의 테이블에서 조용히 잔을 기울이며 음악에 귀를 기울이고 있었다.',
        '바텐더에게 이곳이 얼마나 됐냐고 물으니, 웃으며 "간판을 안 단 지는 오래됐죠"라고 답했다. 광주의 밤은 낮과 다른 얼굴을 하고 있다. 낮의 충장로가 활기찬 상점가라면, 밤의 충장로는 젖은 보도블록 위로 네온이 스며들고, 그 틈새마다 이런 작은 방들이 숨어 있다.',
        '한 시간쯤 앉아 있었을까, 밴드가 연주를 멈추고 잠시 쉬는 사이 창밖을 보니 비가 그쳐 있었다. 젖은 거리 위로 반사되는 간판 불빛들이 마치 또 다른 도시처럼 보였다. Moonlight Sea의 &lt;Rain on Chungjang-ro&gt; 저니는 바로 이 골목, 이 밤의 질감을 담아 만들어졌다. 로파이 재즈 특유의 먼지 낀 듯한 사운드가, 빗물에 씻긴 도시의 표면과 묘하게 닮아 있었다.',
        '광주를 다시 찾는다면, 지도 없이 충장로 뒷골목을 걸어볼 생각이다. 어딘가에서 또 다른 연주가 흘러나오고 있을 테니까.'
      ]
    },
    {
      slug:'why-tokyo-sounds-like-neon', title:'Why Tokyo Sounds Like Neon', read:'5 min read', city:'Tokyo',
      photo:'images/tokyo-tower-night.jpg', grad:'linear-gradient(160deg,#1a1440,#5b3d8f)', relatedJourney:'tokyo-shibuya-after-hours',
      body:[
        '도쿄의 밤을 떠올리면 왜 항상 신스사운드가 함께 떠오르는 걸까. 스크램블 교차로 위로 쏟아지는 전광판 불빛과, 80년대 시티팝 특유의 반짝이는 신스 코드 사이에는 우연이라기엔 너무 닮은 리듬이 있다.',
        '시티팝이 태동하던 시절, 도쿄는 고도성장의 정점에서 밤에도 꺼지지 않는 도시가 되어가고 있었다. 새로 지어진 고층 빌딩의 유리창, 처음 보급되던 컬러 네온사인, 그리고 늦은 밤까지 이어지는 도시의 리듬. 음악은 그 풍경을 그대로 담아냈다. 화려하지만 어딘가 쓸쓸한, 도시의 불빛 같은 사운드였다.',
        '지금의 시부야를 걸어도 그 감각은 크게 다르지 않다. 교차로를 가득 채우는 인파, 건물 벽면을 뒤덮은 스크린, 그 사이로 스며드는 심야버스의 헤드라이트. 이런 풍경 위에는 어쿠스틱 기타보다 신스 패드가, 잔잔한 발라드보다 그루브한 베이스라인이 훨씬 잘 어울린다.',
        '&lt;Shibuya After Hours&gt; 저니를 만들면서 가장 신경 쓴 부분은 그 "반짝임과 공허함 사이의 온도"였다. 네온은 화려하지만 차갑고, 도시는 붐비지만 각자 혼자다. 그 모순된 감각이야말로 도쿄의 밤을 가장 도쿄답게 만드는 요소라고 생각한다.',
        '다음번엔 마지막 야마노테선을 기다리며 그 감각을 한 번 더 따라가 볼 생각이다. 막차의 창밖 풍경은 또 다른 온도를 들려줄 테니까.'
      ]
    },
    {
      slug:'jeju-in-3-4-time', title:'Jeju, in 3/4 Time', read:'4 min read', city:'Jeju',
      photo:'images/jeju-cliff.jpg', grad:'linear-gradient(160deg,#0f2b28,#2f7a6a)', relatedJourney:'jeju-island-wind',
      body:[
        '제주의 해안을 걷다 보면 이상하게도 걸음이 왈츠 박자를 타게 된다. 파도가 밀려오고, 잠시 멈추고, 다시 밀려나가는 세 박자의 리듬. 육지의 걸음과는 분명히 다른 속도다.',
        '현무암 절벽 위로 난 좁은 산책로를 따라가면, 바람은 방향을 예고 없이 바꾸고, 파도는 절벽 아래에서 부서지며 낮고 긴 숨소리를 낸다. 그 사이를 걷는 사람의 걸음도 자연스럽게 느려지고, 흔들리고, 다시 균형을 찾는다.',
        '&lt;Island Wind&gt; 저니에 어쿠스틱 기타를 선택한 이유도 여기에 있다. 전자음이 만들어내는 정확한 박자보다, 현이 떨리며 만들어내는 미세한 흔들림이 이 섬의 리듬에 더 가까웠다. 완벽하게 일정하지 않은, 바람과 파도가 함께 만들어내는 박자.',
        '벤치에 앉아 한참을 그렇게 바다를 보고 있으면, 섬 전체가 아주 느린 왈츠를 추고 있는 것처럼 느껴진다. 서두를 필요가 없는 3/4박자의 시간. 제주에서 가장 오래 기억에 남는 건 언제나 이 리듬이었다.'
      ]
    }
  ];

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  let idx = stories.findIndex(s => s.slug === slug);
  if (idx === -1) idx = 0;
  const s = stories[idx];

  document.title = `${s.title} — Moonlight Sea`;
  const setMeta = (selector, attr, value) => { const el = document.querySelector(selector); if (el) el.setAttribute(attr, value); };
  setMeta('meta[name="description"]', 'content', s.body[0].slice(0, 120));
  setMeta('meta[property="og:title"]', 'content', `${s.title} — Moonlight Sea`);
  setMeta('meta[property="og:description"]', 'content', s.body[0].slice(0, 120));
  setMeta('meta[property="og:url"]', 'content', `https://glittery-yeot-c436d1.netlify.app/story.html?slug=${s.slug}`);
  setMeta('link[rel="canonical"]', 'href', `https://glittery-yeot-c436d1.netlify.app/story.html?slug=${s.slug}`);
  if (s.photo) {
    const imgUrl = `https://glittery-yeot-c436d1.netlify.app/${s.photo}`;
    setMeta('meta[property="og:image"]', 'content', imgUrl);
    setMeta('meta[name="twitter:image"]', 'content', imgUrl);
  }
  document.getElementById('cover').style.background = photoBg(s.photo, s.grad);
  document.getElementById('sCity').textContent = s.city;
  document.getElementById('sTitle').textContent = s.title;
  document.getElementById('sRead').textContent = s.read;

  document.getElementById('essayWrap').innerHTML = s.body.map(p => `<p>${p}</p>`).join('');

  // Related Journey
  const rj = journeys.find(j => j.slug === s.relatedJourney);
  if (rj) {
    document.getElementById('rjCard').style.background = photoBg(rj.photo, rj.grad);
    document.getElementById('rjTitle').textContent = `${rj.city} — ${rj.title}`;
    document.getElementById('rjBtn').href = `journey.html?slug=${rj.slug}`;
  }

  // More Stories (현재 글 제외)
  const moreGrid = document.getElementById('moreGrid');
  stories.filter(x => x.slug !== s.slug).forEach(m => {
    const el = document.createElement('a');
    el.className = 'more-card';
    el.href = `story.html?slug=${m.slug}`;
    el.innerHTML = `
      <div class="more-bg" style="background:${photoBg(m.photo, m.grad)}"></div>
      <div class="more-overlay"></div>
      <div class="more-body">
        <div class="more-read">${m.read}</div>
        <div class="more-title">${m.title}</div>
      </div>
    `;
    moreGrid.appendChild(el);
  });
</script>

</body>
</html>
